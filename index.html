<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oshikoyo</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Icon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    <link rel="stylesheet" href="style.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
</head>

<body>
    <div class="app-container">


        <div class="main-layout" id="mainLayout">
            <div class="calendar-section">
                <div class="controls">
                    <button id="btnPrev" class="nav-btn" aria-label="前の月">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <div class="current-date-display" id="currentDateDisplay"></div>
                    <button id="btnNext" class="nav-btn" aria-label="次の月">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                    <button id="btnSettings" class="nav-btn" aria-label="設定">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                            </path>
                        </svg>
                    </button>
                </div>
                <main class="calendar-wrapper" id="calendarWrapper">
                    <!-- カレンダーの内容はJSによって注入されます -->
                </main>
            </div>
            <aside class="media-area" id="mediaArea">
                <div class="media-container" id="mediaContainer">
                    <p class="media-placeholder">設定から画像を追加してください</p>
                </div>
            </aside>
        </div>
    </div>

    <!-- 設定モーダル -->
    <dialog id="settingsModal" class="settings-modal">
        <form method="dialog" class="settings-form">
            <div class="settings-scroll-area">
                <section class="settings-section">
                    <h3>基本設定</h3>
                    <div class="setting-group">
                        <label>週の開始日</label>
                        <div class="radio-group">
                            <label><input type="radio" name="startOfWeek" value="0" checked> 日曜日</label>
                            <label><input type="radio" name="startOfWeek" value="1"> 月曜日</label>
                        </div>
                    </div>
                    <div class="setting-group">
                        <label>表示月数</label>
                        <div class="radio-group">
                            <label><input type="radio" name="displayMonths" value="1"> 1ヶ月</label>
                            <label><input type="radio" name="displayMonths" value="2" checked> 2ヶ月</label>
                            <label><input type="radio" name="displayMonths" value="3"> 3ヶ月</label>
                        </div>
                    </div>
                    <div class="setting-group">
                        <label>レイアウト</label>
                        <div class="radio-group">
                            <label><input type="radio" name="layout" value="row" checked> 横並び</label>
                            <label><input type="radio" name="layout" value="column"> 縦並び</label>
                        </div>
                    </div>
                </section>

                <section class="settings-section">
                    <h3>推し設定</h3>

                    <div class="setting-group">
                        <label>登録済みの推し</label>
                        <div class="oshi-summary-bar">
                            <span>登録数: <strong id="oshiCount">0</strong> 人</span>
                            <button type="button" id="btnOpenOshiManager" class="btn-secondary">一覧を管理</button>
                        </div>
                        <p class="help-text">※ 追加・編集・インポート・エクスポートは「一覧を管理」から行えます。</p>
                    </div>
                </section>

                <section class="settings-section">
                    <h3>画像表示設定</h3>
                    <div class="setting-group">
                        <label>画像表示モード</label>
                        <select id="mediaMode">
                            <option value="none">なし</option>
                            <option value="single">固定表示</option>
                            <option value="random">ランダム</option>
                            <option value="cycle">サイクル</option>
                        </select>
                    </div>

                    <!-- New: Interval Settings (DHMS) -->
                    <div class="setting-group" id="mediaIntervalSettings">
                        <label>切り替え間隔設定</label>

                        <!-- Random Interval -->
                        <div class="interval-row"
                            style="margin-bottom: 12px; padding: 8px; border: 1px solid #eee; border-radius: 4px;">
                            <label style="font-size: 0.9em; display:block; margin-bottom: 4px;">ランダムモード間隔</label>
                            <div style="display: flex; flex-wrap: wrap; gap: 4px; align-items: center;">
                                <input type="number" id="randD" min="0" placeholder="0"
                                    style="width: 50px;"><span>日</span>
                                <input type="number" id="randH" min="0" max="23" placeholder="0"
                                    style="width: 50px;"><span>時</span>
                                <input type="number" id="randM" min="0" max="59" placeholder="0"
                                    style="width: 50px;"><span>分</span>
                                <input type="number" id="randS" min="0" max="59" placeholder="0"
                                    style="width: 50px;"><span>秒</span>
                            </div>
                        </div>

                        <!-- Cycle Interval -->
                        <div class="interval-row"
                            style="margin-bottom: 0; padding: 8px; border: 1px solid #eee; border-radius: 4px;">
                            <label style="font-size: 0.9em; display:block; margin-bottom: 4px;">サイクルモード間隔</label>
                            <div style="display: flex; flex-wrap: wrap; gap: 4px; align-items: center;">
                                <input type="number" id="cycD" min="0" placeholder="0"
                                    style="width: 50px;"><span>日</span>
                                <input type="number" id="cycH" min="0" max="23" placeholder="0"
                                    style="width: 50px;"><span>時</span>
                                <input type="number" id="cycM" min="0" max="59" placeholder="0"
                                    style="width: 50px;"><span>分</span>
                                <input type="number" id="cycS" min="0" max="59" placeholder="0"
                                    style="width: 50px;"><span>秒</span>
                            </div>
                        </div>
                    </div>

                    <div class="setting-group">
                        <label>画像表示位置</label>
                        <div class="radio-group">
                            <label><input type="radio" name="mediaPosition" value="top"> 上</label>
                            <label><input type="radio" name="mediaPosition" value="bottom"> 下</label>
                            <label><input type="radio" name="mediaPosition" value="left"> 左</label>
                            <label><input type="radio" name="mediaPosition" value="right" checked> 右</label>
                        </div>
                    </div>
                    <div id="localMediaSettings" class="setting-group">
                        <label>ローカル画像管理</label>
                        <div class="local-media-controls">
                            <!-- Existing Folder/File Import Buttons -->
                            <div class="import-buttons" style="margin-bottom: 10px; display: flex; gap: 8px;">
                                <button type="button" id="btnLocalFolder" class="btn-secondary">📂 フォルダから一括登録</button>
                                <input type="file" id="inputLocalFolder" webkitdirectory style="display:none">

                                <button type="button" id="btnLocalFiles" class="btn-secondary">📄 ファイルを追加</button>
                                <input type="file" id="inputLocalFiles" multiple accept="image/*" style="display:none">
                            </div>

                            <!-- New: Export/Import Buttons -->
                            <div class="backup-buttons"
                                style="margin-bottom: 10px; display: flex; gap: 8px; border-top: 1px dashed #eee; padding-top: 8px;">
                                <button type="button" id="btnExportImages" class="btn-secondary"
                                    style="font-size: 0.9em;">📤 画像データを書き出し</button>
                                <button type="button" id="btnImportImages" class="btn-secondary"
                                    style="font-size: 0.9em;">📥 画像データを読み込み</button>
                                <input type="file" id="inputImportImages" accept=".json" multiple style="display:none">
                            </div>

                            <div class="local-status-bar"
                                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                <span>登録済み: <strong id="localImageCount">0</strong> 枚</span>
                                <button type="button" id="btnClearLocal" class="btn-danger-text"
                                    style="color: #ef4444; background: none; border: none; cursor: pointer; text-decoration: underline;">全削除</button>
                            </div>

                            <details class="local-image-manager">
                                <summary style="cursor: pointer; margin-bottom: 8px;">登録済み画像一覧を確認</summary>
                                <div id="localImageList" class="local-image-grid"
                                    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; max-height: 300px; overflow-y: auto;">
                                    <!-- Images injected here -->
                                </div>
                            </details>
                        </div>
                        <p class="help-text" style="font-size: 0.8rem; color: #666; margin-top: 8px;">※
                            画像はブラウザ内に保存されます。バックアップや移行の際は「画像データを書き出し」をご利用ください。</p>
                    </div>
                </section>

                <section class="settings-section">
                    <h3>データ管理</h3>
                    <div class="setting-group">
                        <label>設定のバックアップと復元</label>
                        <div class="backup-controls" style="display: flex; gap: 8px;">
                            <button type="button" id="btnExportSettings" class="btn-secondary">設定を書き出し (保存)</button>
                            <button type="button" id="btnImportSettings" class="btn-secondary">設定を読み込み (復元)</button>
                            <input type="file" id="inputImportSettings" accept=".json" style="display:none">
                        </div>
                        <p class="help-text" style="font-size: 0.8rem; color: #666; margin-top: 5px;">※
                            画像データ自体はバックアップに含まれません。</p>
                    </div>
                </section>
            </div>

            <div class="form-actions">
                <button type="button" id="btnCancel" class="btn-cancel">キャンセル</button>
                <button type="button" id="btnSave" class="btn-primary">保存して反映</button>
            </div>
        </form>
    </dialog>

    <!-- Preview Modal -->
    <dialog id="previewModal" class="settings-modal preview-modal">
        <form method="dialog" class="settings-form">
            <h2>画像の追加確認</h2>
            <p>以下の画像を追加しますか？</p>
            <div class="settings-scroll-area">
                <div id="previewGrid" class="preview-grid">
                    <!-- Previews injected here -->
                </div>
            </div>
            <div class="form-actions">
                <button type="button" id="btnCancelPreview" class="btn-cancel">キャンセル</button>
                <button type="button" id="btnAddPreview" class="btn-primary">追加する</button>
            </div>
        </form>
    </dialog>

    <dialog id="oshiManagementModal" class="settings-modal oshi-manager-modal">
        <form method="dialog" class="settings-form">
            <h2>登録済みの推し一覧</h2>
            <div class="oshi-manager-toolbar">
                <button type="button" id="btnOshiAdd" class="btn-secondary">+ 新規追加</button>
                <button type="button" id="btnOshiImport" class="btn-secondary">📥 インポート</button>
                <input type="file" id="inputOshiImport" accept=".json" multiple style="display:none">
                <button type="button" id="btnOshiExport" class="btn-secondary">📤 エクスポート</button>
            </div>
            <div class="oshi-manager-scroll-area">
                <table class="oshi-table">
                    <thead>
                        <tr>
                            <th>カラー</th>
                            <th>名前</th>
                            <th>誕生日</th>
                            <th>記念日</th>
                            <th>ソース</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="oshiTableBody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
                <p id="oshiTableEmpty" class="empty-list-message"
                    style="display:none; text-align:center; padding: 20px;">まだ登録されていません</p>
            </div>
            <div class="form-actions">
                <button type="button" id="btnCloseOshiManager" class="btn-cancel">閉じる</button>
            </div>
        </form>
    </dialog>

    <!-- Oshi Edit Popup -->
    <dialog id="oshiEditModal" class="settings-modal oshi-edit-modal">
        <form method="dialog" class="settings-form">
            <h2 id="oshiEditTitle">新規追加</h2>
            <input type="hidden" id="oshiEditIndex" value="-1">
            <div class="setting-group">
                <label>名前 <span style="color:#ef4444">*</span></label>
                <input type="text" id="oshiEditName" placeholder="例: ○○ちゃん" required>
            </div>
            <div class="setting-group">
                <label>推しカラー</label>
                <input type="color" id="oshiEditColor" value="#3b82f6">
            </div>
            <div class="setting-group">
                <label>誕生日 <span class="help-text">(例: 1/15 または 2000/1/15)</span></label>
                <input type="text" id="oshiEditBirthday" placeholder="M/D または YYYY/M/D">
            </div>
            <div class="setting-group">
                <label>記念日 <span class="help-text">(例: 4/1 または 2020/4/1)</span></label>
                <input type="text" id="oshiEditDebutDay" placeholder="M/D または YYYY/M/D">
            </div>
            <div class="form-actions">
                <button type="button" id="btnOshiEditCancel" class="btn-cancel">キャンセル</button>
                <button type="button" id="btnOshiEditSave" class="btn-primary">保存</button>
            </div>
        </form>
    </dialog>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container" popover="manual"></div>
    <script src="script.js"></script>
    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered.'))
                    .catch(err => console.log('Service Worker registration failed.', err));
            });
        }
    </script>
</body>

</html>
