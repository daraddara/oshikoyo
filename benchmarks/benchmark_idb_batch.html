<!DOCTYPE html>
<html>
<head>
    <title>IDB Benchmark Batch</title>
</head>
<body>
    <script>
        class LocalImageDB {
            constructor(suffix) {
                this.dbName = 'TestDB_' + suffix + '_' + Date.now();
                this.storeName = 'images';
                this.db = null;
            }

            async open() {
                if (this.db) return this.db;
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, 1);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.storeName)) {
                            db.createObjectStore(this.storeName, { autoIncrement: true });
                        }
                    };
                    request.onsuccess = (e) => {
                        this.db = e.target.result;
                        resolve(this.db);
                    };
                    request.onerror = (e) => reject(e.target.error);
                });
            }

            async addImage(file) {
                await this.open();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.storeName, 'readwrite');
                    const store = tx.objectStore(this.storeName);
                    const request = store.add(file);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async addImages(files) {
                await this.open();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.storeName, 'readwrite');
                    const store = tx.objectStore(this.storeName);
                    let addedCount = 0;

                    tx.oncomplete = () => {
                        resolve(addedCount);
                    };

                    tx.onerror = (e) => {
                        reject(tx.error);
                    };

                    for(const file of files) {
                        store.add(file);
                        addedCount++;
                    }
                });
            }
        }

        async function runBenchmark() {
            const db1 = new LocalImageDB('seq');
            const db2 = new LocalImageDB('par');
            const db3 = new LocalImageDB('batch');

            const numFiles = 500;
            const fileSize = 10000;
            const files = Array.from({length: numFiles}, (_, i) => new File([new Array(fileSize).fill("A").join("")], "dummy" + i + ".jpg", {type: "image/jpeg"}));
            const validFiles = files.filter(f => f.type.startsWith('image/'));

            // Sequential Await
            const startSeq = performance.now();
            let addedSeq = 0;
            for (const file of validFiles) {
                await db1.addImage(file);
                addedSeq++;
            }
            const endSeq = performance.now();

            // Parallel (Promise.all)
            const startPar = performance.now();
            const promises = validFiles.map(f => db2.addImage(f));
            await Promise.all(promises);
            const endPar = performance.now();

            // Single Transaction Batch
            const startBatch = performance.now();
            await db3.addImages(validFiles);
            const endBatch = performance.now();

            document.body.innerHTML = `
                <p>Sequential: ${(endSeq - startSeq).toFixed(2)} ms</p>
                <p>Parallel: ${(endPar - startPar).toFixed(2)} ms</p>
                <p>Batch: ${(endBatch - startBatch).toFixed(2)} ms</p>
                <p id="done">Done</p>
            `;
        }

        runBenchmark().catch(console.error);
    </script>
</body>
</html>
