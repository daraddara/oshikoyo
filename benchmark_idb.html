<!DOCTYPE html>
<html>
<head>
    <title>IDB Benchmark</title>
</head>
<body>
    <script>
        class LocalImageDB {
            constructor() {
                this.dbName = 'TestDB_' + Date.now();
                this.storeName = 'images';
                this.db = null;
            }

            async open() {
                if (this.db) return this.db;
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, 1);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(this.storeName)) {
                            db.createObjectStore(this.storeName, { autoIncrement: true });
                        }
                    };
                    request.onsuccess = (e) => {
                        this.db = e.target.result;
                        resolve(this.db);
                    };
                    request.onerror = (e) => reject(e.target.error);
                });
            }

            async addImage(file) {
                await this.open();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(this.storeName, 'readwrite');
                    const store = tx.objectStore(this.storeName);
                    const request = store.add(file);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
        }

        async function runBenchmark() {
            const db1 = new LocalImageDB();
            const db2 = new LocalImageDB();

            // Create 100 dummy files
            const files = Array.from({length: 100}, (_, i) => new File(["dummy content " + i], "dummy" + i + ".jpg", {type: "image/jpeg"}));

            // Sequential
            const startSeq = performance.now();
            let addedSeq = 0;
            for (const file of files) {
                if (!file.type.startsWith('image/')) continue;
                await db1.addImage(file);
                addedSeq++;
            }
            const endSeq = performance.now();

            // Parallel
            const startPar = performance.now();
            const validFiles = files.filter(f => f.type.startsWith('image/'));
            const promises = validFiles.map(f => db2.addImage(f));
            await Promise.all(promises);
            let addedPar = validFiles.length;
            const endPar = performance.now();

            document.body.innerHTML = `
                <p>Sequential: ${(endSeq - startSeq).toFixed(2)} ms</p>
                <p>Parallel: ${(endPar - startPar).toFixed(2)} ms</p>
                <p id="done">Done</p>
            `;
        }

        runBenchmark().catch(console.error);
    </script>
</body>
</html>
